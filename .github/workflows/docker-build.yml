---
name: Build to Docker Hub
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_CREDS_PRESENT: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        if: ${{ env.DOCKERHUB_CREDS_PRESENT == 'true' }}
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435
      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_CREDS_PRESENT == 'true' }}
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up JDK 17
        if: ${{ env.DOCKERHUB_CREDS_PRESENT == 'true' }}
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build & publish the project
        if: ${{ env.DOCKERHUB_CREDS_PRESENT == 'true' }}
        run: mvn compile jib:build -X -DjibSerialize=true
      - name: Skipped - Docker Hub credentials not configured
        if: ${{ env.DOCKERHUB_CREDS_PRESENT != 'true' }}
        run: echo "DOCKERHUB_USERNAME/DOCKERHUB_TOKEN secrets are not set; skipping Docker Hub build and publish."
