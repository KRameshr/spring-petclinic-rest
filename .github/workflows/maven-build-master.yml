name: Java CI on master branch
on:
  push:
    branches: [ master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Make mvnw executable
        run: chmod +x mvnw
      - name: Start application
        run: |
          nohup ./mvnw spring-boot:run \
            "-Dspring-boot.run.profiles=h2,spring-data-jpa" \
            "-Dspring-boot.run.main-class=org.springframework.samples.petclinic.PetClinicApplication" \
            "-DskipTests" > app.log 2>&1 &
          for i in $(seq 1 30); do
            curl -s http://localhost:9966/petclinic/actuator/health && break
            echo "Waiting for app to start... ($i)"
            sleep 5
          done
      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./mvnw -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=spring-petclinic_spring-petclinic-rest -Dsonar.organization=spring-petclinic
      - name: Upload app log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-log-maven-build
          path: app.log
